<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMS - Login</title>
    <link rel="stylesheet" href="/static/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>🏥 HMS</h1>
                <p>Hospital Management System</p>
            </div>

            <!-- Login Form -->
            <div id="login-form-container">
                <h2>Sign In</h2>
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>Employee ID</label>
                        <input type="text" name="username" required placeholder="e.g. DOC-CARD-00001">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password" required placeholder="Enter password">
                    </div>
                    <button type="submit" class="btn btn-primary">Login</button>
                </form>
            </div>

            <!-- Role Selection -->
            <div id="role-select-container" class="hidden">
                <h2>Select Access</h2>
                <p style="color:#64748b;font-size:13px;margin-bottom:20px;">You have multiple roles. Choose how you want to sign in.</p>
                <div id="role-cards"></div>
            </div>

            <!-- Error Message -->
            <div id="error-msg" class="error-msg hidden"></div>
        </div>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
