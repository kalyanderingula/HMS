services:
  # PostgreSQL - Primary Database
  postgres:
    image: postgres:15-alpine
    container_name: hms_postgres
    restart: always
    environment:
      POSTGRES_DB: hospital_management_system
      POSTGRES_USER: hms_admin
      POSTGRES_PASSWORD: hms_secure_password_2024
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schemas:/docker-entrypoint-initdb.d/schemas
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/00-init.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hms_admin -d hospital_management_system"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
